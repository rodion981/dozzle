  redirected:
    title: Перенаправлено на новий контейнер
    message: Dozzle автоматично перенаправив вас до нового контейнера {containerId}.

  similar-container-found:
    title: Знайдено схожий контейнер
    message: >-
      Dozzle знайшов схожий контейнер {containerId}, який працює на тому ж хості,
      і автоматично переключиться на нього, якщо ви не натиснете «Скасувати».

