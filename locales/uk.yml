  events-stream:
    title: Неочікувана помилка
    message: >-
      Інтерфейс Dozzle не зміг підключитися до API. Перевірте налаштування мережі.
      Якщо ви використовуєте reverse proxy, переконайтеся, що його налаштовано правильно.

  events-timeout:
    title: Щось не так
    message: >-
      Інтерфейс Dozzle не зміг підключитися до API через таймаут.
      Перевірте мережеве з’єднання та спробуйте ще раз.

